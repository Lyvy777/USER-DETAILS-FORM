<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 400px;
            margin: auto;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, textarea, button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #45a049;
        }
        .gender-options {
            display: flex;
            gap: 10px;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>User Details Form</h1>
    <form id="userForm">
        <label for="fullName">Full Name (Required):</label>
        <input type="text" id="fullName" name="fullName" required>

        <label for="email">Email Address (Required):</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number (Required):</label>
        <input type="tel" id="phone" name="phone" required>

        <label>Gender (Required):</label>
        <div class="gender-options">
            <label><input type="radio" name="gender" value="Male" required> Male</label>
            <label><input type="radio" name="gender" value="Female" required> Female</label>
            <label><input type="radio" name="gender" value="Other" required> Other</label>
        </div>

        <label for="comments">Comments:</label>
        <textarea id="comments" name="comments" rows="4"></textarea>

        <button type="submit">Submit</button>
    </form>

    <div id="result" style="display: none;"></div>

    <script>
        document.getElementById('userForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent form from refreshing the page

            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const gender = document.querySelector('input[name="gender"]:checked');
            const comments = document.getElementById('comments').value.trim();

            // Validation
            let isValid = true;
            let errorMessage = '';

            if (!fullName) {
                isValid = false;
                errorMessage += 'Full Name is required.\n';
            }
            if (!email) {
                isValid = false;
                errorMessage += 'Email Address is required.\n';
            } else {
                // Simple email validation regex
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    isValid = false;
                    errorMessage += 'Please enter a valid email address.\n';
                }
            }
            if (!phone) {
                isValid = false;
                errorMessage += 'Phone Number is required.\n';
            }
            if (!gender) {
                isValid = false;
                errorMessage += 'Gender is required.\n';
            }

            if (!isValid) {
                alert(errorMessage);
                return;
            }

            // Prepare data for submission
            const formData = {
                fullName: fullName,
                email: email,
                phone: phone,
                gender: gender.value,
                comments: comments
            };

            // Simulate database submission using fetch (POST method)
            fetch('https://example.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                // Since it's a mock URL, it will likely fail, but we simulate success
                if (!response.ok) {
                    throw new Error('Submission failed');
                }
                return response.json();
            })
            .then(data => {
                // On success, display message and data
                displayResult(formData, 'Form submitted successfully!');
            })
            .catch(error => {
                // Simulate success even on failure for demo purposes
                displayResult(formData, 'Form submitted successfully! (Simulated)');
            });
        });

        function displayResult(data, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h2>${message}</h2>
                <p><strong>Full Name:</strong> ${data.fullName}</p>
                <p><strong>Email Address:</strong> ${data.email}</p>
                <p><strong>Phone Number:</strong> ${data.phone}</p>
                <p><strong>Gender:</strong> ${data.gender}</p>
                <p><strong>Comments:</strong> ${data.comments || 'None'}</p>
            `;
        }
    </script>
</body>
</html>
